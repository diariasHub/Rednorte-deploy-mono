spring:
  application:
    name: ms-usuarios
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}

  # Resource Server: valida JWT contra el JWK set publicado por ms-login-user.
  # En dev por defecto: ms-login-user expone el jwks en http://localhost:8087/.well-known/jwks.json
  # En prod: APP_JWT_JWK_SET_URI apunta al IdP corporativo.
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${APP_JWT_JWK_SET_URI:http://localhost:8087/.well-known/jwks.json}

server:
  port: ${SERVER_PORT:8086}
  error:
    include-message: never
    include-stacktrace: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}
  login-user:
    base-url: ${LOGIN_USER_BASE_URL:http://localhost:8087}
    token: ${LOGIN_USER_TOKEN:}
    connect-timeout: 2s
    read-timeout: 5s

resilience4j:
  retry:
    instances:
      loginUser:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException
  circuitbreaker:
    instances:
      loginUser:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        sliding-window-size: 10
        minimum-number-of-calls: 5

logging:
  level:
    "[org.springframework.security]": INFO
    "[cl.rednorte.ms_usuarios]": INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-}] %logger{36} - %msg%n"
