name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Build and push images
    - name: Build and push ms-api-gateway
      uses: docker/build-push-action@v5
      with:
        context: ./SPS-rednorte-api-gateway
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/ms-api-gateway:latest

    - name: Build and push ms-login-user
      uses: docker/build-push-action@v5
      with:
        context: ./SPS-ms-login-user/ms-login-user
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/ms-login-user:latest

    - name: Build and push ms-usuarios
      uses: docker/build-push-action@v5
      with:
        context: ./SPS-ms-usuarios/ms-usuarios
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/ms-usuarios:latest


    - name: Build and push ms-red-centros
      uses: docker/build-push-action@v5
      with:
        context: ./SPS-ms-red-centros
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/ms-red-centros:latest

    - name: Build and push ms-agenda-profesional
      uses: docker/build-push-action@v5
      with:
        context: ./SPS-ms-agenda-profesional
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/ms-agenda-profesional:latest

    - name: Build and push ms-ficha-clinica
      uses: docker/build-push-action@v5
      with:
        context: ./SPS-ms-ficha-clinica
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/ms-ficha-clinica:latest

    - name: Build and push ms-urgencias-flujo
      uses: docker/build-push-action@v5
      with:
        context: ./ms-urgencias-flujo
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/ms-urgencias-flujo:latest

    - name: Build and push ms-reservas-citas
      uses: docker/build-push-action@v5
      with:
        context: ./SPS-ms-reservas-citas
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/ms-reservas-citas:latest

    - name: Build and push ms-notificaciones
      uses: docker/build-push-action@v5
      with:
        context: ./SPS-ms-notificaciones
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/ms-notificaciones:latest

    - name: Build and push ms-rednorte-front
      uses: docker/build-push-action@v5
      with:
        context: ./SPS-rednorte-frontend
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/ms-rednorte-front:latest

    - name: Build and push ms-service-discovery
      uses: docker/build-push-action@v5
      with:
        context: ./SPS-ms-service-discovery
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/ms-service-discovery:latest

    # Deploy via SSH
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Instalar Docker si no existe
          if ! command -v docker &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y docker.io docker-compose
            sudo systemctl start docker
            sudo systemctl enable docker
          fi
          
          # Si la carpeta no existe, clonamos el repo
          if [ ! -d "/home/ubuntu/rednorte-monorepo" ]; then
            git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /home/ubuntu/rednorte-monorepo
          fi
          
          # Entramos a la carpeta y actualizamos el código
          cd /home/ubuntu/rednorte-monorepo
          git pull origin main
          
          # Vamos a infraestructura y levantamos contenedores
          cd SPS-RedNorte-Infraestructura
          sudo docker-compose pull
          sudo docker-compose up -d
