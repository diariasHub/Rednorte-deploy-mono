name: Deploy Red Centros

on:
  push:
    branches: [ "main" ]
    paths:
      - 'SPS-ms-red-centros/**'
      - '.github/workflows/deploy-red-centros.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        run: |
          cd SPS-RedNorte-Infraestructura
          docker compose build ms-red-centros
          docker compose push ms-red-centros

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/rednorte-monorepo
            git pull origin main
            cd SPS-RedNorte-Infraestructura
            sudo docker compose pull ms-red-centros
            sudo docker compose up -d ms-red-centros

