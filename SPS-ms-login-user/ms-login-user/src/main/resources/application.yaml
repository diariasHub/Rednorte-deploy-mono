spring:
  application:
    name: ms-login-user
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false

server:
  port: ${SERVER_PORT:8087}
  error:
    include-message: never
    include-stacktrace: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}
  security:
    rate-limit:
      login-attempts: ${RATE_LIMIT_LOGIN:10000}
      otp-attempts: ${RATE_LIMIT_OTP:10000}
      patient-otp-attempts: ${RATE_LIMIT_PATIENT_OTP:10000}
      window-seconds: 60
    jwt:
      issuer: ms-login-user
      access-token-ttl-minutes: 10
      refresh-token-ttl-hours: 8
    lockout:
      max-attempts: 5
      lock-minutes: 15
    otp:
      issuer: RedNorte-Urgencias
      digits: 6
      period-seconds: 30
      allowed-discrepancy: 1
    patient-otp:
      ttl-minutes: 5
      length: 6
      max-attempts: 3
      expose-in-response: ${EXPOSE_OTP_IN_RESPONSE:false}
      patient-token-ttl-minutes: 10
  paciente:
    base-url: ${PACIENTE_BASE_URL:http://localhost:8002}
    token: ${PACIENTE_SVC_TOKEN:}
    connect-timeout: 2s
    read-timeout: 5s

resilience4j:
  retry:
    instances:
      paciente:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException
  circuitbreaker:
    instances:
      paciente:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        sliding-window-size: 10
        minimum-number-of-calls: 5

logging:
  level:
    "[org.springframework.security]": INFO
    "[cl.rednorte.ms_login_user]": INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{jti:-}] %logger{36} - %msg%n"
