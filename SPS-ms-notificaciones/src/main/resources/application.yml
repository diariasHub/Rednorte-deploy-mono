spring:
  application:
    name: ms-notificaciones
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ms_notificaciones}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${SERVER_PORT:8011}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    prefer-ip-address: true

aws:
  sqs:
    queue:
      url: ${AWS_SQS_QUEUE_URL:https://sqs.us-east-1.amazonaws.com/385454776682/rednorte-notificaciones-queue}

spring.cloud.aws:
  region:
    static: us-east-1
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID:YOUR_ACCESS_KEY}
    secret-key: ${AWS_SECRET_ACCESS_KEY:YOUR_SECRET_KEY}
